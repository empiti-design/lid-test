<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leben in Deutschland — Trainer</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --text:#e2e8f0; --muted:#94a3b8;
    --accent:#3b82f6; --accent2:#60a5fa; --green:#22c55e; --green-bg:#14532d;
    --red:#ef4444; --red-bg:#4c1d24; --border:#334155; --gold:#fbbf24;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:760px;margin:0 auto;padding:14px}
  header{position:sticky;top:0;background:rgba(15,23,42,.96);backdrop-filter:blur(6px);
    z-index:10;padding:10px 0;border-bottom:1px solid var(--border)}
  h1{font-size:17px;margin:0 0 8px;font-weight:700}
  h1 small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  select,button{font-family:inherit;font-size:14px;border-radius:9px;border:1px solid var(--border);
    background:var(--card2);color:var(--text);padding:7px 10px;cursor:pointer}
  select:focus,button:focus{outline:2px solid var(--accent)}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .stats{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:8px;align-items:center}
  .stats b{color:var(--text)}
  .bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;flex:1;min-width:120px}
  .bar>div{height:100%;background:var(--accent);width:0;transition:width .3s}
  .timer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--gold);font-size:15px}
  .timer.low{color:var(--red)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:14px}
  .tag{display:inline-block;font-size:11px;letter-spacing:.3px;color:var(--accent2);
    background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);
    padding:3px 9px;border-radius:20px;margin-bottom:12px}
  .qnum{float:right;color:var(--muted);font-size:13px;font-weight:600}
  .q-de{font-size:17px;font-weight:600;margin:0 0 4px}
  .q-tr{font-size:15px;color:var(--gold);margin:0 0 14px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:10px;align-items:flex-start;text-align:left;width:100%;
    background:var(--card2);border:1.5px solid var(--border);border-radius:11px;padding:12px 13px;
    transition:.12s;color:var(--text)}
  .opt:hover:not(.locked){border-color:var(--accent);transform:translateY(-1px)}
  .opt .letter{flex-shrink:0;width:24px;height:24px;border-radius:6px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--muted)}
  .opt .otext{flex:1}
  .opt .ode{display:block;font-weight:500}
  .opt .ouk{display:block;font-size:13px;color:var(--gold);margin-top:4px;font-style:italic}
  .opt.sel{border-color:var(--accent);background:rgba(59,130,246,.12)}
  .opt.sel .letter{background:var(--accent);color:#fff}
  .opt.correct{border-color:var(--green);background:var(--green-bg)}
  .opt.correct .letter{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:var(--red-bg)}
  .opt.wrong .letter{background:var(--red);color:#fff}
  .opt.locked{cursor:default}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
  .nav button{flex:1;font-weight:600;padding:12px}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-danger{background:var(--red);border-color:var(--red);color:#fff}
  .feedback{margin-top:12px;font-size:14px;font-weight:600;min-height:20px}
  .feedback.ok{color:var(--green)}
  .feedback.no{color:var(--red)}
  .rtl{direction:rtl;text-align:right}
  .center{text-align:center}
  .big{font-size:34px;font-weight:800;margin:6px 0}
  .pass{color:var(--green)} .fail{color:var(--red)}
  .intro{font-size:14px;color:var(--muted);margin:10px 0 18px}
  footer{color:var(--muted);font-size:12px;text-align:center;margin:22px 0 10px}
  .navgrid{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:12px}
  .legend span{display:flex;align-items:center;gap:5px}
  .dot{width:12px;height:12px;border-radius:4px;display:inline-block;border:1px solid var(--border)}
  .dot.g{background:var(--green)} .dot.r{background:var(--red)} .dot.n{background:var(--card2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:6px}
  .cell{font-size:12px;font-weight:600;padding:7px 0;border-radius:7px;border:1px solid var(--border);
    background:var(--card2);color:var(--muted);cursor:pointer;text-align:center;transition:.1s}
  .cell:hover{transform:translateY(-1px);border-color:var(--accent)}
  .cell.g{background:var(--green-bg);border-color:var(--green);color:#dcfce7}
  .cell.r{background:var(--red-bg);border-color:var(--red);color:#fee2e2}
  .cell.cur{outline:2px solid var(--accent);outline-offset:1px}
  @media(max-width:480px){
    .wrap{padding:10px}
    header{position:static;padding:6px 0}
    h1{font-size:15px;margin-bottom:6px}
    h1 small{font-size:11px}
    .controls{gap:6px}
    select,button{font-size:13px;padding:6px 9px;border-radius:8px}
    .stats{gap:10px;font-size:12px;margin-top:6px}
    .card{padding:14px;margin-top:10px}
    .q-de{font-size:16px}
    .opt{padding:10px 11px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(36px,1fr))}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">Leben in Deutschland — Trainer
      <small id="subtitle"></small>
    </h1>
    <div class="controls">
      <div class="seg">
        <button id="mLearn" class="active"></button>
        <button id="mExam"></button>
      </div>
      <label id="themeWrap"><select id="theme"></select></label>
      <label><select id="lang"></select></label>
      <div class="seg" id="learnTools">
        <button id="listBtn"></button>
        <button id="reset"></button>
      </div>
      <button id="finish" class="btn-danger" style="display:none"></button>
    </div>
    <div class="stats" id="statsLearn">
      <span><span id="lblQ"></span> <b id="pos">1</b>/<b id="total">300</b></span>
      <span>✅ <b id="correct">0</b></span>
      <span>❌ <b id="wrong">0</b></span>
      <div class="bar"><div id="prog"></div></div>
    </div>
    <div class="stats" id="statsExam" style="display:none">
      <span><span id="lblQE"></span> <b id="posE">1</b>/<b>33</b></span>
      <span>⏱ <span id="timer" class="timer">60:00</span></span>
      <div class="bar"><div id="progE"></div></div>
    </div>
  </header>

  <div class="card" id="card"></div>

  <div class="navgrid" id="navgrid" style="display:none">
    <div class="legend">
      <span><i class="dot g"></i><span id="lgOk"></span></span>
      <span><i class="dot r"></i><span id="lgNo"></span></span>
      <span><i class="dot n"></i><span id="lgNew"></span></span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <footer id="footer"></footer>
</div>

const $ = id => document.getElementById(id);
let lang = "de";
let mode = "learn";              // learn | exam
let order = [], cur = 0, answered = {};
// exam
let exQ = [], exPos = 0, exAns = {}, exPhase = "active", exTimer = null, exLeft = 3600, exReview = false;

function T(){ return I18N[lang] || I18N.de; }

/* ---- init selectors ---- */
LANG_ORDER.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=I18N[c].label;$("lang").appendChild(o);});
function fillThemes(){
  const t=T(); $("theme").innerHTML="";
  const o0=document.createElement("option");o0.value="";o0.textContent=t.allThemes;$("theme").appendChild(o0);
  [...new Set(QUESTIONS.map(q=>q.theme))].sort((a,b)=>themeLabel(a).localeCompare(themeLabel(b))).forEach(th=>{
    const o=document.createElement("option");o.value=th;o.textContent=themeLabel(th);$("theme").appendChild(o);
  });
}

/* ---- apply interface language ---- */
function applyUI(){
  const t=T();
  document.documentElement.lang=t.htmlLang;
  document.documentElement.dir=t.rtl?"rtl":"ltr";
  $("subtitle").textContent=t.subtitle;
  $("mLearn").textContent=t.learn;
  $("mExam").textContent=t.exam;
  $("reset").textContent=t.reset;
  $("listBtn").textContent=t.list;
  $("finish").textContent=t.finish;
  $("lgOk").textContent=t.lgOk; $("lgNo").textContent=t.lgNo; $("lgNew").textContent=t.lgNew;
  $("lblQ").textContent=t.qWord;
  $("lblQE").textContent=t.qWord;
  $("footer").textContent=t.footer;
  const sel=$("theme").value; fillThemes(); $("theme").value=sel;
}

/* ===================== LEARN MODE ===================== */
function buildOrder(){
  const theme=$("theme").value;
  order=QUESTIONS.map((q,i)=>i).filter(i=>!theme||QUESTIONS[i].theme===theme);
  cur=0;
}
function doShuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function renderLearn(){
  const t=T(), card=$("card");
  $("statsLearn").style.display="flex"; $("statsExam").style.display="none";
  let c=0,w=0; for(const gi in answered){answered[gi]===QUESTIONS[gi].c?c++:w++;}
  $("correct").textContent=c; $("wrong").textContent=w;
  $("total").textContent=order.length; $("pos").textContent=order.length?cur+1:0;
  $("prog").style.width=order.length?((cur+1)/order.length*100)+"%":"0%";

  if(!order.length){card.innerHTML=`<p class="q-de">${t.noQ}</p>`;return;}
  const gi=order[cur], q=QUESTIONS[gi], chosen=answered[gi];
  card.innerHTML = qCardHTML(q, gi, chosen, true) + `
    <div class="feedback ${chosen===undefined?'':(chosen===q.c?'ok':'no')}" id="fb">${
      chosen===undefined?'':(chosen===q.c? t.fbOk : t.fbNo+letter(q.c))
    }</div>
    <div class="nav">
      <button id="prev" ${cur===0?'disabled':''}>${t.prev}</button>
      <button id="next" class="btn-primary" ${cur>=order.length-1?'disabled':''}>${t.next}</button>
    </div>`;
  bindOpts(gi, chosen===undefined, false);
  $("prev").onclick=()=>{if(cur>0){cur--;renderLearn();}};
  $("next").onclick=()=>{if(cur<order.length-1){cur++;renderLearn();}};
  renderGrid();
}
function renderGrid(){
  if(mode!=="learn"){ $("navgrid").style.display="none"; return; }
  if($("navgrid").style.display==="none") return; // не будуємо, якщо приховано
  const g=$("grid"); g.innerHTML="";
  order.forEach((gi,pos)=>{
    const st=answered[gi];
    let cls="cell"+(st===undefined?"":(st===QUESTIONS[gi].c?" g":" r"))+(pos===cur?" cur":"");
    const b=document.createElement("button");
    b.className=cls; b.textContent=gi+1;
    b.onclick=()=>{cur=pos;renderLearn();window.scrollTo({top:0,behavior:"smooth"});};
    g.appendChild(b);
  });
}

/* ===================== EXAM MODE ===================== */
function startExam(){
  exQ = doShuffle(QUESTIONS.map((q,i)=>i)).slice(0,33);
  exAns={}; exPos=0; exPhase="active"; exReview=false; exLeft=3600;
  $("statsLearn").style.display="none"; $("statsExam").style.display="flex";
  clearInterval(exTimer);
  exTimer=setInterval(()=>{ exLeft--; updTimer(); if(exLeft<=0){clearInterval(exTimer);finishExam(true);} },1000);
  updTimer();
  renderExam();
}
function updTimer(){
  const m=Math.floor(exLeft/60), s=exLeft%60;
  const el=$("timer"); if(!el)return;
  el.textContent=String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
  el.classList.toggle("low", exLeft<=300);
}
function renderExam(){
  const t=T(), card=$("card");
  $("statsLearn").style.display="none"; $("statsExam").style.display="flex";
  $("posE").textContent=exPos+1;
  $("progE").style.width=((exPos+1)/exQ.length*100)+"%";
  const gi=exQ[exPos], q=QUESTIONS[gi], chosen=exAns[gi];
  card.innerHTML = qCardHTML(q, gi, chosen, exReview) + `
    ${exReview?`<div class="feedback ${chosen===undefined?'no':(chosen===q.c?'ok':'no')}" >${
        chosen===undefined? t.fbNo+letter(q.c) : (chosen===q.c? t.fbOk : t.fbNo+letter(q.c))}</div>`:''}
    <div class="nav">
      <button id="prev" ${exPos===0?'disabled':''}>${t.prev}</button>
      <button id="next" class="btn-primary" ${exPos>=exQ.length-1?'disabled':''}>${t.next}</button>
    </div>
    ${exReview?`<div class="nav"><button id="back2res">${t.result} ←</button></div>`:''}`;
  bindOpts(gi, !exReview, true);
  $("prev").onclick=()=>{if(exPos>0){exPos--;renderExam();}};
  $("next").onclick=()=>{if(exPos<exQ.length-1){exPos++;renderExam();}};
  if(exReview)$("back2res").onclick=showResult;
}
function finishExam(timeup){
  clearInterval(exTimer); exPhase="result";
  if(timeup) alert(T().timeUp);
  showResult();
}
function showResult(){
  exReview=false;
  const t=T(), card=$("card");
  $("statsExam").style.display="none"; $("statsLearn").style.display="none";
  let c=0; exQ.forEach(gi=>{if(exAns[gi]===QUESTIONS[gi].c)c++;});
  const pass=c>=17;
  card.innerHTML=`
    <div class="center">
      <div class="tag">${t.finishedExam}</div>
      <div class="big ${pass?'pass':'fail'}">${pass?t.passed:t.failed}</div>
      <div class="big">${c} <span style="font-size:18px;color:var(--muted)">${t.scoreOf} 33</span></div>
      <div class="intro">${t.correctAns}. ${t.need}</div>
      <div class="nav">
        <button id="rev" class="btn-primary">${t.review}</button>
      </div>
      <div class="nav">
        <button id="again">${t.newExam}</button>
        <button id="toLearn">${t.toLearn}</button>
      </div>
    </div>`;
  $("rev").onclick=()=>{exReview=true;exPos=0;$("statsExam").style.display="flex";renderExam();};
  $("again").onclick=startExam;
  $("toLearn").onclick=()=>setMode("learn");
}

/* ===================== shared rendering ===================== */
function letter(i){return ["A","B","C","D"][i];}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function qCardHTML(q, gi, chosen, reveal){
  const t=T(), L=T();
  const trQ = (L.trQ && q[L.trQ]) ? `<p class="q-tr ${L.rtl?'rtl':''}">${esc(q[L.trQ])}</p>` : '';
  let opts="";
  q.ode.forEach((txt,idx)=>{
    const trO=(L.trO && q[L.trO])?`<span class="ouk ${L.rtl?'rtl':''}">${esc(q[L.trO][idx])}</span>`:'';
    let cls="opt";
    if(chosen!==undefined){
      if(reveal){ if(idx===q.c)cls+=" correct"; else if(idx===chosen)cls+=" wrong"; cls+=" locked"; }
      else { if(idx===chosen)cls+=" sel"; }
    }
    opts+=`<button class="${cls}" data-i="${idx}">
      <span class="letter">${letter(idx)}</span>
      <span class="otext"><span class="ode">${esc(txt)}</span>${trO}</span></button>`;
  });
  return `<span class="qnum">#${gi+1}</span>
    <span class="tag">${esc(themeLabel(q.theme))}</span>
    <p class="q-de">${esc(q.de)}</p>${trQ}
    <div class="opts">${opts}</div>`;
}
function bindOpts(gi, clickable, exam){
  if(!clickable)return;
  document.querySelectorAll("#card .opt").forEach(b=>{
    b.onclick=()=>{
      const idx=+b.dataset.i;
      if(exam){ exAns[gi]=idx; renderExam(); }
      else { if(answered[gi]!==undefined)return; answered[gi]=idx; save(); renderLearn(); }
    };
  });
}

/* ===================== mode switch + persistence ===================== */
function setMode(m){
  mode=m;
  $("mLearn").classList.toggle("active",m==="learn");
  $("mExam").classList.toggle("active",m==="exam");
  $("themeWrap").style.display = m==="learn"?"":"none";
  $("learnTools").style.display = m==="learn"?"flex":"none";
  $("finish").style.display = m==="exam"?"":"none";
  if(m!=="learn") $("navgrid").style.display="none";
  clearInterval(exTimer);
  if(m==="learn"){ $("statsExam").style.display="none"; buildOrder(); renderLearn(); }
  else { renderExamIntro(); }
}
function renderExamIntro(){
  const t=T();
  $("statsLearn").style.display="none"; $("statsExam").style.display="none";
  $("card").innerHTML=`<div class="center">
    <div class="tag">${t.exam}</div>
    <p class="q-de" style="margin-top:8px">${t.exam.replace(/^[^ ]+ /,'')}</p>
    <div class="intro">${t.examIntro}</div>
    <div class="nav"><button class="btn-primary" id="startEx">${t.examStart}</button></div>
  </div>`;
  $("startEx").onclick=startExam;
}
function save(){try{localStorage.setItem("lid_answers",JSON.stringify(answered));localStorage.setItem("lid_lang",lang);}catch(e){}}
function load(){try{answered=JSON.parse(localStorage.getItem("lid_answers")||"{}");const l=localStorage.getItem("lid_lang");if(l&&I18N[l])lang=l;}catch(e){answered={};}}

/* ---- events ---- */
$("mLearn").onclick=()=>setMode("learn");
$("mExam").onclick=()=>setMode("exam");
$("theme").onchange=()=>{buildOrder();renderLearn();};
$("lang").onchange=e=>{lang=e.target.value;save();applyUI();
  if(mode==="learn")renderLearn(); else if(exPhase==="result")showResult(); else if(exQ.length)renderExam(); else renderExamIntro();};
$("listBtn").onclick=()=>{const n=$("navgrid");const show=n.style.display==="none";n.style.display=show?"block":"none";$("listBtn").classList.toggle("active",show);if(show)renderGrid();};
$("reset").onclick=()=>{if(confirm(T().resetC)){answered={};save();buildOrder();renderLearn();}};
$("finish").onclick=()=>{if(confirm(T().finishC))finishExam(false);};
document.addEventListener("keydown",e=>{
  if(mode==="learn"){
    if(e.key==="ArrowRight"&&cur<order.length-1){cur++;renderLearn();}
    if(e.key==="ArrowLeft"&&cur>0){cur--;renderLearn();}
    if(["1","2","3","4"].includes(e.key)){const gi=order[cur];if(answered[gi]===undefined){answered[gi]=+e.key-1;save();renderLearn();}}
  } else if(exQ.length && exPhase==="active"){
    if(e.key==="ArrowRight"&&exPos<exQ.length-1){exPos++;renderExam();}
    if(e.key==="ArrowLeft"&&exPos>0){exPos--;renderExam();}
    if(["1","2","3","4"].includes(e.key)){const gi=exQ[exPos];exAns[gi]=+e.key-1;renderExam();}
  }
});

/* ---- start ---- */
load();
$("lang").value=lang;
applyUI();
setMode("learn");
</script>
</body>
